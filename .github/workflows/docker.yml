name: Build Docker image

on:
  push:
    branches: ["master"] # Publish as Docker "latest"
    tags: ["*"]
  pull_request:
    # Only rebuild Docker images if a PR affects it specifically to avoid
    # redundant work since the main workflow already deals with testing builds
    paths:
      - Dockerfile
      - .github/workflows/docker.yml

jobs:
  lint-dockerfile:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
    - uses: actions/checkout@v6
    - uses: hadolint/hadolint-action@v3.3.0
  build:
    runs-on: ubuntu-latest
    if: >-
      !(
        contains(github.event.head_commit.message, '[skip build]') ||
        contains(github.event.head_commit.message, '[build skip]')
      )
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      # docker/build-push-action uses the Git context by default and ignores checkout
      # so this is only to retrieve the Node.js version for the base image.
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .node-version
      - id: node-version
        run: |
          echo -n node-version= >> $GITHUB_OUTPUT
          cat .node-version >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v4
      - uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=${{ github.ref == 'refs/heads/master' }}
          tags: |
            type=ref,event=tag
            type=sha,format=long
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            EMCEE_REVISION=${{ github.sha }}
            NODE_VERSION=${{ steps.node-version.outputs.node-version }}
          pull: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
          sbom: ${{ github.event_name == 'push' }}
